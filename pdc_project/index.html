<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PDC Inventory Engine</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace}
  @keyframes popIn{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.1);opacity:1}100%{transform:scale(1)}}
  .pop-in{animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin .8s linear infinite}
  .log-enter{animation:fadeUp .25s ease-out both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-900 dark:text-zinc-100 transition-colors">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, LabelList } = Recharts;

const Icon = ({ name, className, size=16 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      window.lucide.createIcons({ attrs: { width: size, height: size }, nameAttr: 'data-lucide' });
    }
  }, [name, size]);
  return <span ref={ref} className={"inline-flex "+(className||"")} />;
};

const PARADIGMS = {
  sequential: { key:'sequential', label:'Sequential', sub:'1 Core',  cmd:'Run Sequential', icon:'cpu',     base:2.5,
    btn:'bg-slate-800 hover:bg-slate-900 dark:bg-slate-700 dark:hover:bg-slate-600 text-white', bar:'#64748b' },
  threads:    { key:'threads',    label:'POSIX Threads', sub:'4 Cores', cmd:'Run POSIX Threads', icon:'git-branch', base:0.6,
    btn:'bg-emerald-600 hover:bg-emerald-700 text-white', bar:'#10b981' },
  openmp:     { key:'openmp',     label:'OpenMP', sub:'Auto-Parallel', cmd:'Run OpenMP', icon:'zap', base:0.5,
    btn:'bg-cyan-600 hover:bg-cyan-700 text-white', bar:'#06b6d4' },
};

const PRESETS = [
  { v:10,  label:'10M' }, { v:50, label:'50M' },
  { v:100, label:'100M' }, { v:250, label:'250M', heavy:true },
];

const OPERATIONS = [
  'Apply 5% Inflation + 18% GST',
  'Apply 10% Clearance Discount',
];

function App(){
  const [dark, setDark] = useState(true);
  const [size, setSize] = useState(50);
  const [op, setOp] = useState(OPERATIONS[0]);
  const [times, setTimes] = useState({ sequential:null, threads:null, openmp:null });
  const [running, setRunning] = useState(null);
  const [logs, setLogs] = useState([
    { t:'info', msg:'[READY] Engine idle. Awaiting execution command.' },
  ]);
  const termRef = useRef(null);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);

  useEffect(() => {
    if (termRef.current) termRef.current.scrollTop = termRef.current.scrollHeight;
  }, [logs]);

  const addLog = (t, msg) => setLogs(l => [...l, { t, msg, id:Date.now()+Math.random() }]);

  const speedup = useMemo(() => {
    const s = times.sequential;
    if (!s) return null;
    const p = Math.min(times.threads ?? Infinity, times.openmp ?? Infinity);
    if (!isFinite(p)) return null;
    return (s / p);
  }, [times]);

  const run = (key) => {
    if (running) return;
    const p = PARADIGMS[key];
    setRunning(key);
    addLog('warn', `[SYSTEM] Initializing ${p.label} engine for ${size}M records...`);
    addLog('info', `[OP] ${op}`);

    const scale = size > 50 ? (size / 50) : 1;
    const noise = 0.85 + Math.random() * 0.3;
    const t = +(p.base * scale * noise).toFixed(2);

    setTimeout(() => {
      setTimes(prev => ({ ...prev, [key]: t }));
      addLog('ok', `[COMPLETED] ${p.label} execution finished in ${t.toFixed(2)} seconds.`);
      if (key !== 'sequential' && times.sequential) {
        const sp = (times.sequential / t).toFixed(2);
        addLog('ok', `[SPEEDUP] ${sp}x faster than Sequential baseline.`);
      }
      setRunning(null);
    }, Math.max(300, t * 1000));
  };

  const chartData = Object.values(PARADIGMS).map(p => ({
    name: p.label,
    time: times[p.key] ?? 0,
    fill: p.bar,
  }));

  const logColor = (t) => t==='ok' ? 'text-emerald-400' : t==='warn' ? 'text-amber-300' : t==='err' ? 'text-red-400' : 'text-slate-300';

  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="border-b border-slate-200 dark:border-zinc-800 bg-white/70 dark:bg-zinc-900/60 backdrop-blur sticky top-0 z-10">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-cyan-500 to-emerald-500 flex items-center justify-center text-white shadow-sm">
              <Icon name="database" size={18} />
            </div>
            <div>
              <h1 className="text-base sm:text-lg font-bold tracking-tight">PDC Inventory Engine</h1>
              <p className="text-xs text-slate-500 dark:text-zinc-400">Parallel Computing Control Panel</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            {speedup && (
              <div key={speedup} className="pop-in inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs sm:text-sm font-semibold bg-gradient-to-r from-amber-400 to-orange-500 text-white shadow-lg shadow-orange-500/20">
                <Icon name="flame" size={14} />
                {speedup.toFixed(2)}x Faster!
              </div>
            )}
            <button onClick={() => setDark(d=>!d)} className="p-2 rounded-lg border border-slate-200 dark:border-zinc-800 hover:bg-slate-100 dark:hover:bg-zinc-800 transition">
              <Icon name={dark?'sun':'moon'} size={16} />
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        {/* Left column */}
        <div className="lg:col-span-1 space-y-6">
          {/* Config */}
          <section className="bg-white dark:bg-zinc-900 rounded-xl border border-slate-200 dark:border-zinc-800 p-5 shadow-sm">
            <div className="flex items-center gap-2 mb-4">
              <Icon name="sliders-horizontal" size={16} />
              <h2 className="font-semibold">Configuration</h2>
            </div>
            <label className="text-xs uppercase tracking-wide text-slate-500 dark:text-zinc-400">Data Workload Size</label>
            <div className="mt-1.5 flex items-stretch rounded-lg border border-slate-200 dark:border-zinc-800 overflow-hidden focus-within:ring-2 ring-cyan-500/40">
              <input type="number" min="1" value={size}
                onChange={e=>setSize(Math.max(1, parseInt(e.target.value)||1))}
                className="flex-1 px-3 py-2 bg-transparent outline-none font-medium" />
              <span className="px-3 py-2 text-sm text-slate-500 dark:text-zinc-400 bg-slate-50 dark:bg-zinc-800 border-l border-slate-200 dark:border-zinc-800 flex items-center">Million Items</span>
            </div>
            <div className="mt-3 flex flex-wrap gap-2">
              {PRESETS.map(p => (
                <button key={p.v} onClick={()=>setSize(p.v)}
                  className={"px-2.5 py-1 rounded-full text-xs font-medium border transition "+
                    (size===p.v
                      ? "bg-slate-900 dark:bg-zinc-100 text-white dark:text-zinc-900 border-transparent"
                      : "bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-800 hover:bg-slate-50 dark:hover:bg-zinc-800")
                  }>
                  {p.label}{p.heavy && <span className="ml-1 text-amber-500">⚡</span>}
                </button>
              ))}
            </div>

            <label className="mt-5 block text-xs uppercase tracking-wide text-slate-500 dark:text-zinc-400">Operation Type</label>
            <select value={op} onChange={e=>setOp(e.target.value)}
              className="mt-1.5 w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 outline-none focus:ring-2 ring-cyan-500/40">
              {OPERATIONS.map(o => <option key={o}>{o}</option>)}
            </select>
          </section>

          {/* Execution */}
          <section className="bg-white dark:bg-zinc-900 rounded-xl border border-slate-200 dark:border-zinc-800 p-5 shadow-sm">
            <div className="flex items-center gap-2 mb-4">
              <Icon name="server" size={16} />
              <h2 className="font-semibold">Execution Nodes</h2>
            </div>
            <div className="space-y-3">
              {Object.values(PARADIGMS).map(p => {
                const isRun = running === p.key;
                const disabled = !!running;
                return (
                  <button key={p.key} disabled={disabled} onClick={()=>run(p.key)}
                    className={"w-full flex items-center justify-between gap-3 px-4 py-3.5 rounded-lg font-semibold transition shadow-sm "+
                      p.btn + (disabled ? " opacity-60 cursor-not-allowed" : " hover:shadow-md")}>
                    <span className="flex items-center gap-3">
                      {isRun
                        ? <span className="spin inline-block w-4 h-4 border-2 border-white/40 border-t-white rounded-full" />
                        : <Icon name={p.icon} size={16} />}
                      <span className="text-left">
                        <span className="block text-sm">{p.cmd}</span>
                        <span className="block text-[11px] font-normal opacity-80">{p.sub}</span>
                      </span>
                    </span>
                    {times[p.key] != null && !isRun && (
                      <span className="mono text-xs bg-white/15 px-2 py-1 rounded">{times[p.key].toFixed(2)}s</span>
                    )}
                  </button>
                );
              })}
            </div>
          </section>
        </div>

        {/* Right column */}
        <div className="lg:col-span-2 space-y-6">
          {/* Chart */}
          <section className="bg-white dark:bg-zinc-900 rounded-xl border border-slate-200 dark:border-zinc-800 p-5 shadow-sm">
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="font-semibold flex items-center gap-2"><Icon name="bar-chart-3" size={16}/>Performance Metrics</h2>
                <p className="text-xs text-slate-500 dark:text-zinc-400 mt-0.5">Execution time across computing paradigms (seconds)</p>
              </div>
              <span className="text-xs px-2 py-1 rounded bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-300">{size}M items</span>
            </div>
            <div style={{width:'100%', height: 320}}>
              <ResponsiveContainer>
                <BarChart data={chartData} margin={{top:20,right:20,left:0,bottom:5}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={dark?'#27272a':'#e2e8f0'} vertical={false}/>
                  <XAxis dataKey="name" stroke={dark?'#a1a1aa':'#64748b'} tick={{fontSize:12}}/>
                  <YAxis stroke={dark?'#a1a1aa':'#64748b'} tick={{fontSize:12}} domain={[0,'auto']} label={{ value:'Seconds', angle:-90, position:'insideLeft', style:{fill: dark?'#a1a1aa':'#64748b', fontSize:12}}}/>
                  <Tooltip
                    contentStyle={{
                      background: dark?'#18181b':'#fff',
                      border:`1px solid ${dark?'#27272a':'#e2e8f0'}`,
                      borderRadius:8, fontSize:12,
                    }}
                    formatter={(v)=>[`${v}s`,'Time']}/>
                  <Bar dataKey="time" radius={[8,8,0,0]}>
                    {chartData.map((d,i)=><Cell key={i} fill={d.fill}/>)}
                    <LabelList dataKey="time" position="top" formatter={(v)=>v?`${v}s`:''} style={{fill: dark?'#e4e4e7':'#0f172a', fontSize:11, fontWeight:600}}/>
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </section>

          {/* Console */}
          <section className="bg-white dark:bg-zinc-900 rounded-xl border border-slate-200 dark:border-zinc-800 shadow-sm overflow-hidden">
            <div className="flex items-center justify-between px-5 py-3 border-b border-slate-200 dark:border-zinc-800">
              <div className="flex items-center gap-2">
                <Icon name="terminal" size={16}/>
                <h2 className="font-semibold">Console Logs</h2>
              </div>
              <div className="flex items-center gap-1.5">
                <span className="w-2.5 h-2.5 rounded-full bg-red-400"/>
                <span className="w-2.5 h-2.5 rounded-full bg-amber-400"/>
                <span className="w-2.5 h-2.5 rounded-full bg-emerald-400"/>
              </div>
            </div>
            <div ref={termRef} className="mono text-xs h-48 overflow-y-auto bg-zinc-950 p-4 space-y-1">
              {logs.map((l,i) => (
                <div key={l.id||i} className={"log-enter "+logColor(l.t)}>
                  <span className="text-zinc-600 mr-2">{String(i+1).padStart(3,'0')}</span>{l.msg}
                </div>
              ))}
              <div className="text-emerald-400">
                <span className="text-zinc-600 mr-2">›</span><span className="animate-pulse">▌</span>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
